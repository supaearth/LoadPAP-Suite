events {}

http {
    include /etc/nginx/mime.types;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080;
        server_tokens off;
        absolute_redirect off;
        port_in_redirect off;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "no-referrer" always;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 86400;

        location ~ ^/(PyLOAD_V3\.0|PyRUSH_V3\.0|PyLOG_V3\.0|PyLIVE_Test1\.0|PyCUT_BetaV1\.0)/?$ {
            return 302 /?__loadpap_page=$1;
        }

        # Streamlit emits relative ./_stcore requests on multipage routes.
        # Rewrite runtime paths to root so Starlette sees the expected route.
        location ~ ^/[^/]+/(_stcore/(health|host-config|stream))$ {
            rewrite ^/[^/]+/(_stcore/(health|host-config|stream))$ /$1 break;
            proxy_pass http://127.0.0.1:8501;
        }

        location ~ ^/[^/]+/(static/.*)$ {
            rewrite ^/[^/]+/(static/.*)$ /$1 break;
            proxy_pass http://127.0.0.1:8501;
        }

        location ~ ^/[^/]+/(favicon\.png)$ {
            rewrite ^/[^/]+/(favicon\.png)$ /$1 break;
            proxy_pass http://127.0.0.1:8501;
        }

        location / {
            proxy_pass http://127.0.0.1:8501;
        }
    }
}
